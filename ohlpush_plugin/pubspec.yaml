name: ohlpush_plugin

description: 这是一个基于 OHLPush 功能的扩展的 Flutter 插件。使用此插件能够帮助您在使用 Flutter 开发应用时，快速地实现推送功能。

version: 1.0.0

homepage: http://www.mob.com/mobService/mobpush

environment:

  sdk: ">=2.15.1 <3.0.0"

  flutter: ">=1.20.0"

dependencies:

  flutter:
    sdk: flutter


dev_dependencies:

  flutter_test:
    sdk: flutter

flutter:

  plugin:
    platforms:
      android:
        package: com.ohaola.sdk.flutter.ohlpush_plugin
        pluginClass: OhlpushPlugin

false_secrets:
  - example/android/app/google-services.json
